version: '3.8'

services:
  db:
    image: postgres:15
    container_name: cab-booking-db
    environment:
      POSTGRES_DB: cab_booking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: cab-booking-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/cab_booking
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: cab-booking-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
